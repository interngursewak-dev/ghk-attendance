<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>GHK Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090e;
      --surface:   #0d1018;
      --surface2:  #131720;
      --surface3:  #181e2a;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);

      --accent:    #00e87c;
      --accent2:   rgba(0,232,124,0.15);
      --accent3:   rgba(0,232,124,0.06);
      --red:       #ff3355;
      --red2:      rgba(255,51,85,0.15);
      --blue:      #3b9eff;
      --blue2:     rgba(59,158,255,0.15);
      --amber:     #ffb300;
      --amber2:    rgba(255,179,0,0.15);

      --text:      #dde4f0;
      --text2:     #6b7587;
      --text3:     #363d4d;

      --r:         10px;
      --r2:        14px;
    }

    html, body { min-height: 100%; background: var(--bg); font-family: 'Syne', sans-serif; color: var(--text); -webkit-font-smoothing: antialiased; }

    /* ── SUBTLE DOT GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .app { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 0 12px 72px; }

    /* ── HEADER ── */
    .header {
      width: 100%; max-width: 420px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0 12px;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-mark {
      width: 34px; height: 34px; border-radius: 8px;
      background: var(--accent); display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 800; color: #000; letter-spacing: -0.5px;
    }
    .logo-text { line-height: 1.15; }
    .logo-name { font-size: 0.92rem; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
    .logo-sub  { font-size: 0.6rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; }
    .clock {
      font-family: 'Space Mono', monospace;
      font-size: 1.05rem; font-weight: 700;
      color: var(--accent); letter-spacing: 1px;
    }

    /* ── CARD ── */
    .card {
      width: 100%; max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--r2);
      overflow: hidden;
      box-shadow: 0 0 0 1px var(--border), 0 24px 48px rgba(0,0,0,0.6), 0 0 60px rgba(0,232,124,0.04);
    }

    /* ── CAMERA ── */
    .cam-wrap {
      position: relative; width: 100%; padding-bottom: 72%; background: #000; overflow: hidden;
    }
    video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    /* Vignette overlay */
    .cam-wrap::after {
      content: '';
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 45%, rgba(7,9,14,0.8) 100%);
      z-index: 2;
    }

    /* Corner brackets */
    .brk { position: absolute; width: 22px; height: 22px; z-index: 5; transition: opacity 0.3s; }
    .brk.tl { top: 14px; left: 14px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); border-radius: 3px 0 0 0; }
    .brk.tr { top: 14px; right: 14px; border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); border-radius: 0 3px 0 0; }
    .brk.bl { bottom: 14px; left: 14px; border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); border-radius: 0 0 0 3px; }
    .brk.br { bottom: 14px; right: 14px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); border-radius: 0 0 3px 0; }

    /* Face reticle */
    .reticle {
      position: absolute; z-index: 4;
      top: 50%; left: 50%;
      transform: translate(-50%, -56%);
      width: 144px; height: 186px;
      border: 1.5px solid rgba(0,232,124,0.5);
      border-radius: 50%;
      box-shadow: 0 0 0 2000px rgba(7,9,14,0.5);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .reticle.scanning {
      border-color: var(--accent);
      box-shadow: 0 0 0 2000px rgba(7,9,14,0.55), 0 0 24px rgba(0,232,124,0.4);
    }
    /* Small tick marks at N/S/E/W */
    .reticle::before, .reticle::after {
      content: ''; position: absolute; background: var(--accent);
    }
    .reticle::before { top: -1px; left: 50%; transform: translateX(-50%); width: 12px; height: 2px; border-radius: 1px; }
    .reticle::after  { bottom: -1px; left: 50%; transform: translateX(-50%); width: 12px; height: 2px; border-radius: 1px; }
    .tick-l, .tick-r { position: absolute; background: var(--accent); width: 2px; height: 12px; border-radius: 1px; top: 50%; transform: translateY(-50%); z-index: 5; }
    .tick-l { left: -1px; } .tick-r { right: -1px; }

    /* Scan line */
    .scan-line {
      position: absolute; z-index: 6;
      left: 50%; transform: translateX(-50%);
      width: 144px; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, #fff 50%, var(--accent) 70%, transparent 100%);
      box-shadow: 0 0 10px var(--accent), 0 0 20px rgba(0,232,124,0.5);
      display: none;
      animation: scanline 1.15s ease-in-out infinite;
    }
    @keyframes scanline {
      0%,100% { top: 8%; }
      50%      { top: 78%; }
    }

    /* Scan label */
    .scan-label {
      position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
      font-family: 'Space Mono', monospace; font-size: 0.6rem; font-weight: 700;
      color: var(--accent); letter-spacing: 2px; text-transform: uppercase;
      display: none; z-index: 7; white-space: nowrap;
      text-shadow: 0 0 10px var(--accent);
    }

    /* Loading bar (bottom of camera) */
    .load-banner {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 8;
      background: linear-gradient(transparent, rgba(7,9,14,0.95));
      padding: 24px 16px 12px;
    }
    .load-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .load-txt { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--text2); letter-spacing: 0.5px; }
    .load-pct { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--accent); font-weight: 700; }
    .load-track { height: 2px; background: rgba(255,255,255,0.08); border-radius: 1px; }
    .load-fill { height: 100%; background: var(--accent); border-radius: 1px; width: 0%; transition: width 0.5s ease; box-shadow: 0 0 8px var(--accent); }

    /* ── STATUS BAR ── */
    .sbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .sdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .sdot.green { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .sdot.amber { background: var(--amber); box-shadow: 0 0 8px var(--amber); animation: blink 1.2s infinite; }
    .sdot.red   { background: var(--red);   box-shadow: 0 0 8px var(--red); }
    @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0.2 } }
    .stext {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem; color: var(--text2); letter-spacing: 0.3px; flex: 1;
    }

    /* ── PANEL ── */
    .panel { padding: 18px 16px 20px; }
    .hidden { display: none !important; }

    /* Prompt text */
    .cam-prompt {
      font-size: 0.7rem; font-weight: 600; color: var(--text2);
      text-align: center; margin-bottom: 14px; letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── PUNCH BUTTON ── */
    .btn-punch {
      width: 100%; padding: 18px 20px;
      background: var(--accent3);
      border: 1.5px solid var(--accent);
      border-radius: var(--r);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 1rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer;
      position: relative; overflow: hidden;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      animation: glowpulse 3s ease-in-out infinite;
    }
    .btn-punch::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      transform: scaleX(0); transform-origin: left;
      transition: transform 0.18s ease;
      z-index: 0;
    }
    .btn-punch span { position: relative; z-index: 1; }
    .btn-punch:active:not(:disabled)::before { transform: scaleX(1); }
    .btn-punch:active:not(:disabled) { color: #000; transform: scale(0.985); }
    .btn-punch:disabled {
      background: transparent; border-color: var(--text3); color: var(--text3);
      cursor: not-allowed; animation: none; box-shadow: none;
    }
    @keyframes glowpulse {
      0%,100% { box-shadow: 0 0 16px rgba(0,232,124,0.12); }
      50%      { box-shadow: 0 0 28px rgba(0,232,124,0.28); }
    }

    /* ── ALERT ── */
    .alert {
      margin-top: 12px; padding: 10px 14px; border-radius: 8px;
      font-size: 0.78rem; font-weight: 600; line-height: 1.5; display: none;
    }
    .alert.show    { display: block; }
    .alert.success { background: var(--accent2); color: var(--accent); border: 1px solid rgba(0,232,124,0.25); }
    .alert.error   { background: var(--red2);    color: var(--red);    border: 1px solid rgba(255,51,85,0.25); }
    .alert.info    { background: var(--blue2);   color: var(--blue);   border: 1px solid rgba(59,158,255,0.25); }
    .alert.warning { background: var(--amber2);  color: var(--amber);  border: 1px solid rgba(255,179,0,0.25); }

    /* ── FORM (REGISTER) ── */
    .flabel {
      display: block; font-size: 0.62rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); margin-bottom: 6px;
    }
    .finput {
      width: 100%; padding: 13px 14px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: var(--r); color: var(--text);
      font-family: 'Syne', sans-serif; font-size: 0.92rem; outline: none;
      margin-bottom: 12px; transition: border-color 0.2s;
    }
    .finput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,232,124,0.08); }
    .finput::placeholder { color: var(--text3); }

    .reg-tip {
      font-size: 0.7rem; color: var(--text2); line-height: 1.6;
      padding: 10px 12px; background: var(--surface3); border-radius: 8px;
      border-left: 2px solid var(--accent); margin-bottom: 12px;
    }

    .btn {
      display: block; width: 100%;
      padding: 14px 20px;
      border-radius: var(--r);
      font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
      cursor: pointer; text-align: center; letter-spacing: 0.5px;
      transition: transform 0.1s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn.primary {
      background: var(--accent); color: #000; border: none; margin-bottom: 8px;
    }
    .btn.ghost {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border2);
    }
    .btn.ghost:hover { border-color: var(--border); color: var(--text); }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 62px;
      background: rgba(13,16,24,0.96);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border2);
      display: flex; z-index: 100;
    }
    .nav-btn {
      flex: 1; border: none; background: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
      color: var(--text3); font-family: 'Syne', sans-serif;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
      -webkit-tap-highlight-color: transparent; transition: color 0.15s;
      position: relative;
    }
    .nav-btn:active { opacity: 0.7; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn.active::before {
      content: ''; position: absolute; top: 0; left: 20%; right: 20%;
      height: 2px; background: var(--accent); border-radius: 0 0 2px 2px;
      box-shadow: 0 0 8px var(--accent);
    }
    .nav-icon { font-size: 1.25rem; line-height: 1; }

    /* ── REPORT SECTION ── */
    #report-section { display: none; width: 100%; max-width: 420px; margin-top: 12px; }
    .rcard {
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--r2); padding: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
    }
    .rcard-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    .rcard-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }
    .rcard-count {
      font-family: 'Space Mono', monospace; font-size: 2.2rem; font-weight: 700;
      color: var(--accent); text-align: center; margin: 4px 0 2px;
    }
    .rcard-sub { font-size: 0.65rem; color: var(--text2); text-align: center; margin-bottom: 14px; letter-spacing: 0.5px; text-transform: uppercase; }

    .rrow {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .rrow:last-child { border-bottom: none; }
    .rrow-left { flex: 1; }
    .rname { font-size: 0.82rem; font-weight: 700; color: var(--text); margin-bottom: 3px; }
    .rtimes { display: flex; gap: 6px; align-items: center; }

    .tbadge {
      display: inline-flex; align-items: center; gap: 4px;
      font-family: 'Space Mono', monospace; font-size: 0.62rem; font-weight: 700;
      padding: 2px 7px; border-radius: 4px;
    }
    .tbadge.in  { background: var(--accent2); color: var(--accent); }
    .tbadge.out { background: var(--red2);    color: var(--red); }
    .tbadge.none { color: var(--text3); font-size: 0.6rem; }

    .rhours {
      font-family: 'Space Mono', monospace; font-size: 0.65rem; font-weight: 700;
      color: var(--accent); padding: 3px 8px; background: var(--accent3);
      border-radius: 4px; white-space: nowrap; margin-left: 8px;
      border: 1px solid rgba(0,232,124,0.15);
    }

    /* ── SUCCESS SCREEN ── */
    #ss {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: var(--bg); flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 24px; text-align: center;
    }
    #ss.show { display: flex; }

    .ss-ring {
      width: 140px; height: 140px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.5rem; margin-bottom: 24px; position: relative;
      animation: popin 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .ss-ring::before {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid transparent; animation: spinring 2s linear infinite;
    }
    .ss-ring.in  { background: var(--accent2); }
    .ss-ring.in::before  { border-top-color: var(--accent); border-right-color: var(--accent); box-shadow: 0 0 24px rgba(0,232,124,0.3); }
    .ss-ring.out { background: var(--red2); }
    .ss-ring.out::before { border-top-color: var(--red); border-right-color: var(--red); box-shadow: 0 0 24px rgba(255,51,85,0.3); }
    .ss-ring.reg { background: var(--blue2); }
    .ss-ring.reg::before { border-top-color: var(--blue); border-right-color: var(--blue); box-shadow: 0 0 24px rgba(59,158,255,0.3); }

    @keyframes popin { from { transform: scale(0.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes spinring { to { transform: rotate(360deg); } }

    .ss-tag {
      font-size: 0.62rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
      padding: 4px 14px; border-radius: 20px; margin-bottom: 14px;
    }
    .ss-tag.in  { background: var(--accent2); color: var(--accent); border: 1px solid rgba(0,232,124,0.3); }
    .ss-tag.out { background: var(--red2);    color: var(--red);    border: 1px solid rgba(255,51,85,0.3); }
    .ss-tag.reg { background: var(--blue2);   color: var(--blue);   border: 1px solid rgba(59,158,255,0.3); }

    .ss-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; color: var(--text); }
    .ss-time { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--text2); margin-bottom: 8px; }
    .ss-hours {
      display: none; font-family: 'Space Mono', monospace;
      font-size: 0.85rem; font-weight: 700; color: var(--accent);
      padding: 8px 20px; background: var(--accent3); border-radius: 30px;
      margin-bottom: 8px; border: 1px solid rgba(0,232,124,0.2);
    }
    .ss-conf { font-size: 0.68rem; color: var(--text3); margin-bottom: 28px; font-family: 'Space Mono', monospace; }
    .ss-back {
      width: 100%; max-width: 300px; padding: 16px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2); border-radius: var(--r);
      font-family: 'Syne', sans-serif; font-size: 0.92rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.5px;
      transition: background 0.2s, border-color 0.2s;
    }
    .ss-back:active { background: var(--surface3); }

    /* ── DIVIDER ── */
    .divider {
      height: 1px; background: var(--border); margin: 14px 0;
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <div class="logo-mark">GHK</div>
      <div class="logo-text">
        <div class="logo-name">Lab Attendance</div>
        <div class="logo-sub">Biometric System</div>
      </div>
    </div>
    <div class="clock" id="clock">--:--</div>
  </div>

  <!-- MAIN CARD -->
  <div class="card">

    <!-- Camera -->
    <div class="cam-wrap">
      <video id="video" autoplay muted playsinline webkit-playsinline></video>

      <!-- Corner brackets -->
      <span class="brk tl"></span>
      <span class="brk tr"></span>
      <span class="brk bl"></span>
      <span class="brk br"></span>

      <!-- Face reticle with ticks -->
      <div class="reticle" id="reticle">
        <span class="tick-l"></span>
        <span class="tick-r"></span>
      </div>

      <!-- Green scan line (shows during detection) -->
      <div class="scan-line" id="scan-bar"></div>

      <!-- Monospace scan label -->
      <div class="scan-label" id="scan-label">Scanning…</div>

      <!-- Loading progress (bottom of camera) -->
      <div class="load-banner" id="load-banner">
        <div class="load-row">
          <span class="load-txt" id="load-txt">Initialising…</span>
          <span class="load-pct" id="load-pct">0%</span>
        </div>
        <div class="load-track"><div class="load-fill" id="load-fill"></div></div>
      </div>
    </div>

    <!-- Status -->
    <div class="sbar">
      <div class="sdot amber" id="sdot"></div>
      <span class="stext" id="stext">Starting camera…</span>
    </div>

    <!-- ATTENDANCE PANEL -->
    <div class="panel" id="panel-attend">
      <div class="cam-prompt">Centre your face · Hold still · Tap to scan</div>
      <button class="btn-punch" id="btn-punch" disabled>
        <span>⏳&nbsp; Loading AI Models…</span>
      </button>
      <div class="alert" id="alert-attend"></div>
    </div>

    <!-- REGISTER PANEL -->
    <div class="panel hidden" id="panel-register">
      <label class="flabel" for="reg-name">Full Name</label>
      <input type="text" id="reg-name" class="finput" placeholder="e.g. Rahul Sharma" autocomplete="off">
      <div class="reg-tip">📸 Face the camera clearly. The system captures <strong style="color:var(--accent)">5 frames</strong> and averages them for maximum accuracy.</div>
      <button class="btn primary" id="btn-save">📸&nbsp; Scan &amp; Save Face</button>
      <button class="btn ghost"   id="btn-cancel">← Cancel</button>
      <div class="alert" id="alert-reg"></div>
    </div>

  </div><!-- /card -->

  <!-- REPORT -->
  <div id="report-section">
    <div class="rcard">
      <div class="rcard-head">
        <span class="rcard-title">Today's Attendance</span>
        <button class="btn ghost" id="btn-close-rpt" style="width:auto;padding:6px 14px;font-size:0.72rem;">✕ Close</button>
      </div>
      <div class="rcard-count" id="rpt-count">—</div>
      <div class="rcard-sub">Staff present today</div>
      <div class="divider"></div>
      <div id="rpt-list"></div>
    </div>
  </div>

</div><!-- /app -->

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="goHome()">
    <span class="nav-icon">🏠</span>Home
  </button>
  <button class="nav-btn" id="nav-add" onclick="goAdd()">
    <span class="nav-icon">➕</span>Add Staff
  </button>
  <button class="nav-btn" id="nav-report" onclick="goReport()">
    <span class="nav-icon">📋</span>Report
  </button>
</nav>

<!-- SUCCESS SCREEN -->
<div id="ss">
  <div class="ss-ring in" id="ss-ring">✅</div>
  <div class="ss-tag in"  id="ss-tag">PUNCHED IN</div>
  <div class="ss-name"    id="ss-name"></div>
  <div class="ss-time"    id="ss-time"></div>
  <div class="ss-hours"   id="ss-hours"></div>
  <div class="ss-conf"    id="ss-conf"></div>
  <button class="ss-back" onclick="closeSS()">← Next Person</button>
</div>

<script>
  // ▼▼▼ YOUR APPS SCRIPT URL ▼▼▼
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwMfjN5xufbzwzAmrJhFJ-3ctcTQWA0rh7LMO6aTnXkWq5i7Vrp-Kj-UikqkpxweDM/exec';

  // ── TUNING ────────────────────────────────
  const THRESHOLD     = 0.38;  // Raise to 0.42 if staff are rejected too often
  const DETECT_FRAMES = 5;
  const REG_FRAMES    = 5;
  const FRAME_GAP_MS  = 100;
  const INPUT_SIZE    = 160;   // 128=faster, 224=more accurate
  const CACHE_KEY     = 'ghk-models-v3';
  const MODEL_URL     = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
  // ─────────────────────────────────────────

  var faceapi     = null;
  var faceMatcher = null;
  var isReady     = false;
  var userLoc     = null;
  const video     = document.getElementById('video');

  // Clock (Space Mono, 12hr)
  function tickClock() {
    var t = new Date();
    var h = t.getHours() % 12 || 12;
    var m = String(t.getMinutes()).padStart(2,'0');
    var a = t.getHours() >= 12 ? 'PM' : 'AM';
    document.getElementById('clock').textContent = h + ':' + m + ' ' + a;
  }
  tickClock(); setInterval(tickClock, 15000);

  // GPS
  if (navigator.geolocation)
    navigator.geolocation.getCurrentPosition(
      function(p){ userLoc = {lat:p.coords.latitude, lng:p.coords.longitude}; },
      function(){}, {timeout:8000}
    );

  // ── 1. START CAMERA IMMEDIATELY ───────────
  navigator.mediaDevices.getUserMedia({
    video: { facingMode:'user', width:{ideal:320}, height:{ideal:240} }, audio:false
  }).then(function(stream){
    video.srcObject = stream; video.play();
    setStatus('Camera ready — loading AI…', 'amber');
    loadFaceApiScript();
  }).catch(function(err){
    setStatus('Camera error: ' + err.message, 'red');
    setBtn('btn-punch', false, '❌ Camera unavailable');
  });

  // ── 2. LOAD face-api.js DYNAMICALLY ───────
  function loadFaceApiScript() {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js';
    s.onload  = function(){ faceapi = window.faceapi; loadModels(); };
    s.onerror = function(){ setStatus('AI script load failed — check internet', 'red'); };
    document.head.appendChild(s);
  }

  // ── 3. LOAD MODELS WITH BROWSER CACHE ─────
  async function loadModels() {
    try {
      var cache = null;
      try { cache = await caches.open(CACHE_KEY); } catch(e){}
      if (cache) {
        var origFetch = window.fetch;
        window.fetch = async function(url, opts) {
          if (typeof url === 'string' && url.indexOf('face-api') > -1) {
            try {
              var hit = await cache.match(url);
              if (hit) return hit;
              var resp = await origFetch(url, opts);
              if (resp && resp.ok) { try { await cache.put(url, resp.clone()); } catch(e){} }
              return resp;
            } catch(e){ return origFetch(url, opts); }
          }
          return origFetch(url, opts);
        };
      }
prog('Loading AI models in parallel…', 20);
 await Promise.all([
      faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
       faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL),
       faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
     ]);
     prog('Models ready — loading staff…', 85);
      await loadDatabase();
      document.getElementById('load-banner').style.display = 'none';
    } catch(err) {
      setStatus('❌ ' + err. message, 'red');
      document.getElementById('load-txt').textContent = '❌ ' + err.message;
    }
  }

  function prog(msg, pct) {
    document.getElementById('load-txt').textContent = msg;
    document.getElementById('load-pct').textContent = pct + '%';
    document.getElementById('load-fill').style.width = pct + '%';
  }

  // ── LOAD STAFF DB ──────────────────────────
  async function loadDatabase() {
    var res = await api('getUsers', {});
    if (res.error) throw new Error(res.error);
    if (!res.users || !res.users.length) {
      setStatus('No staff registered yet', 'amber');
      setBtn('btn-punch', true, '⚠️  No Staff Registered');
      return;
    }
    var descs = res.users.map(function(u){
      return new faceapi.LabeledFaceDescriptors(u.label, [new Float32Array(JSON.parse(u.descriptor))]);
    });
    faceMatcher = new faceapi.FaceMatcher(descs, THRESHOLD);
    isReady = true;
    setStatus(res.users.length + ' staff loaded · System ready', 'green');
    setBtn('btn-punch', false, '✅&nbsp; Mark Attendance');
    document.getElementById('btn-punch').querySelector('span').innerHTML = '✅&nbsp;&nbsp;Mark Attendance';
  }

  // ── MULTI-FRAME DETECTION ──────────────────
  async function detectAvg(frames) {
    var opts = new faceapi.TinyFaceDetectorOptions({inputSize: INPUT_SIZE, scoreThreshold: 0.45});
    var descs = [];
    for (var i = 0; i < frames; i++) {
      try {
        var det = await faceapi.detectSingleFace(video, opts).withFaceLandmarks(true).withFaceDescriptor();
        if (det) descs.push(det.descriptor);
        updateScanLabel(i + 1, frames);
      } catch(e){}
      if (i < frames-1) await sleep(FRAME_GAP_MS);
    }
    if (descs.length < Math.ceil(frames * 0.6)) return null;
    var avg = new Float32Array(128);
    for (var j = 0; j < descs.length; j++) for (var k = 0; k < 128; k++) avg[k] += descs[j][k];
    for (var k = 0; k < 128; k++) avg[k] /= descs.length;
    return { descriptor: avg, count: descs.length };
  }

  function updateScanLabel(frame, total) {
    document.getElementById('scan-label').textContent = 'FRAME ' + frame + '/' + total;
  }

  function sleep(ms){ return new Promise(function(r){ setTimeout(r, ms); }); }

  // ── MARK ATTENDANCE ────────────────────────
  document.getElementById('btn-punch').addEventListener('click', async function(){
    if (!isReady){ showAlert('alert-attend','⏳ System still loading — please wait.','info'); return; }
    setBtn('btn-punch', true, '🔍&nbsp; Scanning…');
    setScan(true);

    var result = await detectAvg(DETECT_FRAMES);
    setScan(false);

    if (!result){
      setBtn('btn-punch', false, '✅&nbsp; Mark Attendance');
      showAlert('alert-attend','❌ No face detected. Centre your face in the oval and hold still.','error');
      return;
    }
    var match = faceMatcher.findBestMatch(result.descriptor);
    if (match.label === 'unknown'){
      setBtn('btn-punch', false, '✅&nbsp; Mark Attendance');
      showAlert('alert-attend','❌ Face not recognised. Ensure good lighting or re-register.','error');
      return;
    }
    showAlert('alert-attend','⏳ Saving attendance for ' + match.label + '…','info');
    var res = await api('recordAttendance', {name: match.label, gps: userLoc});
    setBtn('btn-punch', false, '✅&nbsp; Mark Attendance');
    if (res.error){ showAlert('alert-attend','⚠️ ' + res.error,'warning'); return; }
    var conf = Math.round(Math.max(0,(1 - match.distance / THRESHOLD)) * 100);
    showSS(res.type, res.name, res.time, res.date, res.workingHours, conf, result.count);
  });

  // ── REGISTER ──────────────────────────────
  document.getElementById('btn-save').addEventListener('click', async function(){
    var name = document.getElementById('reg-name').value.trim();
    if (!name){ showAlert('alert-reg','⚠️ Enter staff name first.','error'); return; }
    if (!faceapi){ showAlert('alert-reg','⏳ AI still loading — please wait.','info'); return; }
    setBtn('btn-save', true, '📸 Scanning ' + REG_FRAMES + ' frames…');
    showAlert('alert-reg','⏳ Hold still — capturing face samples…','info');
    setScan(true);
    var result = await detectAvg(REG_FRAMES);
    setScan(false);
    if (!result){
      setBtn('btn-save', false, '📸  Scan & Save Face');
      showAlert('alert-reg','❌ Face not detected clearly. Ensure good lighting.','error'); return;
    }
    showAlert('alert-reg','⏳ Saving to database…','info');
    var res = await api('registerUser', {name: name, descriptor: JSON.stringify(Array.from(result.descriptor))});
    setBtn('btn-save', false, '📸  Scan & Save Face');
    if (res.success){
      document.getElementById('reg-name').value = '';
      goHome(); await loadDatabase();
      showSS('register', name, '', '', '', null, result.count);
    } else {
      showAlert('alert-reg','⚠️ ' + (res.message||'Unknown error'),'error');
    }
  });
  document.getElementById('btn-cancel').addEventListener('click', goHome);

  // ── REPORT ────────────────────────────────
  document.getElementById('btn-close-rpt').addEventListener('click', function(){
    document.getElementById('report-section').style.display = 'none';
  });

  async function loadReport(){
    document.getElementById('report-section').style.display = 'block';
    document.getElementById('rpt-count').textContent = '…';
    document.getElementById('rpt-list').innerHTML = '<p style="font-size:0.75rem;color:var(--text2);padding:8px 0;font-family:Space Mono,monospace;">Loading…</p>';
    try {
      var res = await api('getDailyReport', {});
      document.getElementById('rpt-count').textContent = res.count || 0;
      if (!res.staff || !res.staff.length){
        document.getElementById('rpt-list').innerHTML = '<p style="font-size:0.75rem;color:var(--text2);text-align:center;padding:12px;font-family:Space Mono,monospace;">No attendance recorded today.</p>';
        return;
      }
      var html = '';
      res.staff.forEach(function(s, i){
        var inB  = s.inTime  ? '<span class="tbadge in">▶ ' + s.inTime  + '</span>' : '<span class="tbadge none">—</span>';
        var outB = s.outTime ? '<span class="tbadge out">■ ' + s.outTime + '</span>' : '<span class="tbadge none">still in</span>';
        var hrs  = s.workingHours ? '<span class="rhours">⏱ ' + s.workingHours + '</span>' : '';
        var map  = s.mapLink ? ' <a href="'+s.mapLink+'" target="_blank" style="color:var(--blue);text-decoration:none;font-size:0.8rem;">📍</a>' : '';
        html += '<div class="rrow"><div class="rrow-left"><div class="rname">' + (i+1) + '. ' + s.name + map + '</div><div class="rtimes">' + inB + outB + '</div></div>' + hrs + '</div>';
      });
      document.getElementById('rpt-list').innerHTML = html;
      document.getElementById('report-section').scrollIntoView({behavior:'smooth'});
    } catch(e){
      document.getElementById('rpt-list').innerHTML = '<p style="color:var(--red);font-size:0.75rem;">Error loading report.</p>';
    }
  }

  // ── NAVIGATION ────────────────────────────
  function setNavActive(id){
    ['nav-home','nav-add','nav-report'].forEach(function(n){
      document.getElementById(n).classList.toggle('active', n === id);
    });
  }
  function goHome(){
    showPanel('attend');
    document.getElementById('report-section').style.display = 'none';
    setNavActive('nav-home');
  }
  function goAdd(){
    if (!faceapi){ alert('AI models still loading. Please wait a moment.'); return; }
    showPanel('register');
    setNavActive('nav-add');
    setTimeout(function(){ document.getElementById('reg-name').focus(); }, 100);
  }
  function goReport(){
    showPanel('attend');
    setNavActive('nav-report');
    loadReport();
  }

  // ── SUCCESS SCREEN ─────────────────────────
  function showSS(type, name, time, date, hours, conf, frames){
    var isReg = type==='register', isIN = type==='IN', isOUT = type==='OUT';
    var cls = isReg ? 'reg' : (isIN ? 'in' : 'out');
    document.getElementById('ss-ring').textContent = isReg ? '🎉' : (isIN ? '✅' : '🔴');
    document.getElementById('ss-ring').className = 'ss-ring ' + cls;
    document.getElementById('ss-tag').textContent = isReg ? 'REGISTERED' : (isIN ? 'PUNCHED IN' : 'PUNCHED OUT');
    document.getElementById('ss-tag').className = 'ss-tag ' + cls;
    document.getElementById('ss-name').textContent = name;
    document.getElementById('ss-time').textContent = isReg ? 'Face saved to database' : ('🕐 ' + time + '  ·  📅 ' + date);
    var hoursEl = document.getElementById('ss-hours');
    if (isOUT && hours){ hoursEl.textContent = '⏱ ' + hours + ' worked today'; hoursEl.style.display = 'block'; }
    else { hoursEl.style.display = 'none'; }
    var confEl = document.getElementById('ss-conf');
    confEl.textContent = conf !== null && conf !== undefined
      ? 'CONFIDENCE: ' + conf + '%  ·  FRAMES: ' + frames
      : 'REGISTERED WITH ' + frames + ' FACE SAMPLES';
    document.getElementById('ss').classList.add('show');
  }
  function closeSS(){ document.getElementById('ss').classList.remove('show'); }

  // ── HELPERS ───────────────────────────────
  function setScan(on){
    document.getElementById('scan-bar').style.display   = on ? 'block' : 'none';
    document.getElementById('scan-label').style.display = on ? 'block' : 'none';
    document.getElementById('reticle').classList.toggle('scanning', on);
    if (!on) document.getElementById('scan-label').textContent = 'Scanning…';
  }
  function showPanel(name){
    document.getElementById('panel-attend').classList.toggle('hidden',   name !== 'attend');
    document.getElementById('panel-register').classList.toggle('hidden', name !== 'register');
  }
  function setStatus(msg, color){
    document.getElementById('stext').textContent = msg;
    document.getElementById('sdot').className = 'sdot ' + color;
  }
  function setBtn(id, disabled, html){
    var b = document.getElementById(id);
    b.disabled = disabled;
    if (b.querySelector('span')) b.querySelector('span').innerHTML = html;
    else b.innerHTML = '<span>' + html + '</span>';
  }
  function showAlert(id, msg, type){
    var el = document.getElementById(id);
    el.textContent = msg; el.className = 'alert ' + type + ' show';
    if (type !== 'info') setTimeout(function(){ el.classList.remove('show'); }, 5000);
  }
  async function api(action, payload){
    var res = await fetch(GAS_URL + '?action=' + action, {
      method:'POST', mode:'cors', headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(payload)
    });
    return res.json();
  }
</script>
</body>
</html>
