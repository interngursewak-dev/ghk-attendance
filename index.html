<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>GHK Attendance</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #1a1a1a; --white: #fff; --grey: #f0f2f5;
      --green: #155724; --green-bg: #d4edda; --green-btn: #1a7a3f;
      --red: #721c24;   --red-bg: #f8d7da;   --red-btn: #c0392b;
      --blue: #0c5460;  --blue-bg: #d1ecf1;
      --amber: #856404; --amber-bg: #fff3cd;
      --muted: #666;    --radius: 10px;
    }
    html, body { height: 100%; background: var(--grey); font-family: 'Segoe UI', sans-serif; }

    /* ── LAYOUT ── */
    .app { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 12px 12px 80px; }

    /* ── HEADER ── */
    .header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .logo { font-size: 1rem; font-weight: 700; }
    .logo span { color: #c00; }
    .clock { font-size: 0.95rem; font-weight: 600; color: var(--muted); letter-spacing: 1px; }

    /* ── CARD ── */
    .card { width: 100%; max-width: 400px; background: var(--white); border: 2px solid var(--black); border-radius: 14px; overflow: hidden; box-shadow: 4px 4px 0 var(--black); }

    /* ── CAMERA ── */
    .cam-wrap { position: relative; width: 100%; padding-bottom: 70%; background: #111; overflow: hidden; }
    video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    /* Face oval guide */
    .oval { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); width: 130px; height: 170px; border: 2.5px dashed rgba(255,255,255,0.8); border-radius: 50%; pointer-events: none; box-shadow: 0 0 0 2000px rgba(0,0,0,0.35); }

    /* Scan bar — green line sweeping when scanning */
    .scan-bar { position: absolute; left: 50%; transform: translateX(-50%); width: 130px; height: 3px; background: rgba(40,200,100,0.85); border-radius: 2px; display: none; animation: sweep 1.1s ease-in-out infinite; }
    @keyframes sweep {
      0%   { top: calc(50% - 85px - 55%*0 ); }
      50%  { top: calc(50% + 85px - 55%*0 ); }
      100% { top: calc(50% - 85px - 55%*0 ); }
    }
    /* simpler: just move between fixed positions */
    @keyframes sweep2 { 0%,100%{ margin-top: -82px; } 50%{ margin-top: 50px; } }
    .scan-bar { top: 50%; margin-top: -82px; animation: sweep2 1.1s ease-in-out infinite; }

    /* ── LOADING BANNER (inside camera, not full overlay) ── */
    .load-banner { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.82); padding: 10px 16px; }
    .load-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .load-txt { color: #fff; font-size: 0.78rem; font-weight: 600; }
    .load-pct { color: rgba(255,255,255,0.7); font-size: 0.72rem; }
    .load-track { height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; }
    .load-fill { height: 100%; background: #4ade80; border-radius: 3px; width: 0%; transition: width 0.5s ease; }

    /* ── STATUS BAR ── */
    .sbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 0.82rem; font-weight: 600; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.green { background: #28a745; }
    .dot.amber { background: #ffc107; animation: blink 1s infinite; }
    .dot.red   { background: #dc3545; }
    @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:0.3 } }

    /* ── PANEL ── */
    .panel { padding: 14px 16px 18px; }
    .hidden { display: none !important; }

    /* PUNCH BUTTON */
    .btn-punch { display: block; width: 100%; padding: 16px; border: none; border-radius: var(--radius); font-size: 1.05rem; font-weight: 700; cursor: pointer; color: #fff; background: var(--green-btn); margin-bottom: 0; transition: transform 0.1s, opacity 0.2s; -webkit-tap-highlight-color: transparent; }
    .btn-punch:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-punch:active:not(:disabled) { transform: scale(0.97); }

    /* GENERIC BUTTON */
    .btn { display: block; width: 100%; padding: 13px; border: 2px solid var(--black); border-radius: var(--radius); font-size: 0.92rem; font-weight: 700; cursor: pointer; background: var(--white); color: var(--black); text-align: center; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
    .btn:active { transform: scale(0.97); }
    .btn.primary { background: var(--black); color: var(--white); border-color: var(--black); }
    .btn.danger  { background: var(--red-btn); color: #fff; border-color: var(--red-btn); }

    /* ── BOTTOM NAV — always visible ── */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 2px solid var(--black); display: flex; z-index: 100; }
    .nav-btn { flex: 1; padding: 12px 8px; border: none; background: none; font-size: 0.72rem; font-weight: 700; color: var(--black); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; -webkit-tap-highlight-color: transparent; border-right: 1px solid #eee; }
    .nav-btn:last-child { border-right: none; }
    .nav-btn:active { background: #f5f5f5; }
    .nav-icon { font-size: 1.3rem; }

    /* FORM */
    .flabel { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 4px; }
    .finput { width: 100%; padding: 12px 13px; border: 2px solid #ccc; border-radius: var(--radius); font-size: 0.95rem; outline: none; margin-bottom: 10px; }
    .finput:focus { border-color: var(--black); }

    /* ALERTS */
    .alert { padding: 10px 12px; border-radius: 8px; font-size: 0.83rem; font-weight: 600; margin-top: 10px; line-height: 1.5; display: none; }
    .alert.show    { display: block; }
    .alert.success { background: var(--green-bg); color: var(--green); }
    .alert.error   { background: var(--red-bg);   color: var(--red); }
    .alert.info    { background: var(--blue-bg);  color: var(--blue); }
    .alert.warning { background: var(--amber-bg); color: var(--amber); }

    /* ── REPORT SHEET ── */
    #report-section { display: none; width: 100%; max-width: 400px; margin-top: 12px; }
    .rcard { background: var(--white); border: 2px solid var(--black); border-radius: 12px; padding: 14px; box-shadow: 3px 3px 0 var(--black); }
    .rcard h3 { font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; }
    .rbig { font-size: 2.4rem; font-weight: 800; text-align: center; }
    .rsub { font-size: 0.72rem; color: var(--muted); text-align: center; margin-bottom: 10px; }
    .rrow { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #eee; font-size: 0.8rem; }
    .rrow:last-child { border-bottom: none; }
    .rrow .rname { font-weight: 700; }
    .rrow .rtimes { color: var(--muted); font-size: 0.74rem; margin-top: 2px; }
    .rhours { font-size: 0.72rem; font-weight: 700; padding: 2px 7px; border-radius: 20px; background: #e8f5e9; color: var(--green); white-space: nowrap; }
    .badge-in  { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; background: #d4edda; color: var(--green); }
    .badge-out { display: inline-block; padding: 1px 7px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; background: #f8d7da; color: var(--red); }

    /* ── SUCCESS SCREEN ── */
    #ss { display: none; position: fixed; inset: 0; background: #fff; z-index: 200; flex-direction: column; align-items: center; justify-content: center; padding: 28px 20px; text-align: center; }
    #ss.show { display: flex; }
    .ss-icon { font-size: 4rem; margin-bottom: 14px; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes pop { from{ transform:scale(0.2); opacity:0 } to{ transform:scale(1); opacity:1 } }
    .ss-badge { display: inline-block; padding: 4px 16px; border-radius: 20px; font-size: 0.76rem; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
    .ss-badge.in  { background: #d4edda; color: var(--green); }
    .ss-badge.out { background: #f8d7da; color: var(--red); }
    .ss-badge.reg { background: #d1ecf1; color: var(--blue); }
    .ss-name  { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .ss-time  { font-size: 0.88rem; color: var(--muted); margin-bottom: 6px; }
    .ss-hours { font-size: 1rem; font-weight: 700; color: var(--green); margin-bottom: 10px; padding: 7px 18px; background: #d4edda; border-radius: 30px; display: none; }
    .ss-conf  { font-size: 0.75rem; color: var(--muted); margin-bottom: 24px; }
    .ss-back  { width: 100%; max-width: 280px; padding: 15px; background: var(--black); color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700; cursor: pointer; }

    /* tip text above punch button */
    .tip { text-align: center; font-size: 0.74rem; color: var(--muted); margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="logo">GHK <span>Lab</span> Attendance</div>
    <div class="clock" id="clock">--:-- --</div>
  </div>

  <!-- ── MAIN CARD ── -->
  <div class="card">

    <!-- Camera always starts immediately -->
    <div class="cam-wrap">
      <video id="video" autoplay muted playsinline webkit-playsinline></video>
      <div class="oval" id="oval"></div>
      <div class="scan-bar" id="scan-bar"></div>

      <!-- Loading progress at bottom of camera frame — doesn't block camera view -->
      <div class="load-banner" id="load-banner">
        <div class="load-row">
          <span class="load-txt" id="load-txt">⏳ Loading AI models…</span>
          <span class="load-pct" id="load-pct">0%</span>
        </div>
        <div class="load-track"><div class="load-fill" id="load-fill"></div></div>
      </div>
    </div>

    <!-- Status dot -->
    <div class="sbar">
      <div class="dot amber" id="sdot"></div>
      <span id="stext">Starting camera…</span>
    </div>

    <!-- ── ATTEND PANEL ── -->
    <div class="panel" id="panel-attend">
      <div class="tip">👆 Centre your face in the oval and tap the button</div>
      <button class="btn-punch" id="btn-punch" disabled>⏳ Loading AI…</button>
      <div class="alert" id="alert-attend"></div>
    </div>

    <!-- ── REGISTER PANEL ── -->
    <div class="panel hidden" id="panel-register">
      <label class="flabel" for="reg-name">Staff Full Name</label>
      <input type="text" id="reg-name" class="finput" placeholder="e.g. Rahul Sharma" autocomplete="off">
      <p style="font-size:0.76rem;color:var(--muted);margin-bottom:10px;background:#f8f9fa;padding:8px;border-radius:8px;">
        📸 Look straight at the camera. We take 5 photos and average them for better accuracy.
      </p>
      <button class="btn primary" id="btn-save" style="margin-bottom:8px;">📸  Scan &amp; Save Face</button>
      <button class="btn" id="btn-cancel">← Back</button>
      <div class="alert" id="alert-reg"></div>
    </div>

  </div><!-- /card -->

  <!-- ── REPORT ── -->
  <div id="report-section">
    <div class="rcard">
      <h3>📋 Today's Attendance</h3>
      <div class="rbig" id="rpt-count">—</div>
      <div class="rsub">Staff present today</div>
      <div id="rpt-list"></div>
      <button class="btn" id="btn-close-rpt" style="margin-top:10px;">✕ Close</button>
    </div>
  </div>

</div><!-- /app -->

<!-- ── BOTTOM NAV — always visible on all screens ── -->
<div class="bottom-nav">
  <button class="nav-btn" id="nav-home" onclick="goHome()">
    <span class="nav-icon">🏠</span>Attendance
  </button>
  <button class="nav-btn" id="nav-add" onclick="goAdd()">
    <span class="nav-icon">➕</span>Add Staff
  </button>
  <button class="nav-btn" id="nav-report" onclick="goReport()">
    <span class="nav-icon">📋</span>Report
  </button>
</div>

<!-- ── SUCCESS SCREEN ── -->
<div id="ss">
  <div class="ss-icon" id="ss-icon">✅</div>
  <div class="ss-badge" id="ss-badge">IN</div>
  <div class="ss-name"  id="ss-name"></div>
  <div class="ss-time"  id="ss-time"></div>
  <div class="ss-hours" id="ss-hours"></div>
  <div class="ss-conf"  id="ss-conf"></div>
  <button class="ss-back" onclick="closeSS()">← Next Person</button>
</div>

<!-- face-api loaded AFTER page renders so camera can start immediately -->
<script>
  // ▼▼▼ PASTE YOUR APPS SCRIPT URL HERE ▼▼▼
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwMfjN5xufbzwzAmrJhFJ-3ctcTQWA0rh7LMO6aTnXkWq5i7Vrp-Kj-UikqkpxweDM/exec';

  // ── TUNING ──────────────────────────────────
  const THRESHOLD      = 0.38;  // Lower = stricter. Try 0.42 if staff are rejected too often
  const DETECT_FRAMES  = 5;     // Frames averaged per punch (more = more accurate, slower)
  const REG_FRAMES     = 5;     // Frames when registering
  const FRAME_GAP_MS   = 100;   // Delay between frames
  const INPUT_SIZE     = 160;   // Detection input size. 128 = faster, 224 = more accurate
  // ────────────────────────────────────────────

  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
  const CACHE_KEY = 'ghk-models-v2';

  var faceapi       = null;  // set after script loads
  var faceMatcher   = null;
  var isReady       = false;
  var userLoc       = null;

  const video = document.getElementById('video');

  // ── Clock ──────────────────────────────────
  function tickClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', hour12:true });
  }
  tickClock();
  setInterval(tickClock, 15000);

  // ── GPS ─────────────────────────────────────
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      function(p){ userLoc = { lat: p.coords.latitude, lng: p.coords.longitude }; },
      function(){},
      { timeout: 8000 }
    );
  }

  // ── STEP 1: start camera IMMEDIATELY ────────
  navigator.mediaDevices.getUserMedia({
    video: { facingMode:'user', width:{ ideal:320 }, height:{ ideal:240 } },
    audio: false
  }).then(function(stream) {
    video.srcObject = stream;
    video.play();
    setStatus('Camera ready — loading AI…', 'amber');
    // STEP 2: load face-api script after camera is running
    loadFaceApiScript();
  }).catch(function(err) {
    setStatus('Camera error: ' + err.message, 'red');
    setBtn('btn-punch', false, '❌ Camera unavailable');
  });

  // ── STEP 2: load face-api.js dynamically ────
  function loadFaceApiScript() {
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js';
    s.onload = function() {
      faceapi = window.faceapi;
      loadModels();
    };
    s.onerror = function() {
      setStatus('Failed to load AI — check internet', 'red');
    };
    document.head.appendChild(s);
  }

  // ── STEP 3: load models with caching ────────
  async function loadModels() {
    prog('Loading face detector…', 20);
    try {
      // Use Cache API to avoid re-downloading models on every visit
      var cache = null;
      try { cache = await caches.open(CACHE_KEY); } catch(e) {}

      // Monkey-patch fetch so face-api's model loads go through the cache
      if (cache) {
        var origFetch = window.fetch;
        window.fetch = async function(url, opts) {
          if (typeof url === 'string' && url.indexOf('face-api') > -1) {
            try {
              var hit = await cache.match(url);
              if (hit) return hit;
              var resp = await origFetch(url, opts);
              if (resp && resp.ok) {
                try { await cache.put(url, resp.clone()); } catch(e){}
              }
              return resp;
            } catch(e) { return origFetch(url, opts); }
          }
          return origFetch(url, opts);
        };
        document.getElementById('stext').textContent += ' (caching for speed)';
      }

      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      prog('Loading landmarks…', 55);
      await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
      prog('Loading recognition…', 80);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      prog('Loading staff list…', 92);
      await loadDatabase();

      // Hide loading banner
      document.getElementById('load-banner').style.display = 'none';

    } catch(err) {
      setStatus('❌ ' + err.message, 'red');
      document.getElementById('load-txt').textContent = '❌ ' + err.message;
    }
  }

  function prog(msg, pct) {
    document.getElementById('load-txt').textContent = msg;
    document.getElementById('load-pct').textContent = pct + '%';
    document.getElementById('load-fill').style.width = pct + '%';
  }

  // ── LOAD STAFF DATABASE ──────────────────────
  async function loadDatabase() {
    try {
      var res = await api('getUsers', {});
      if (res.error) throw new Error(res.error);
      if (!res.users || res.users.length === 0) {
        setStatus('No staff registered yet', 'amber');
        setBtn('btn-punch', true, '⚠️ No staff registered');
        return;
      }
      var descs = res.users.map(function(u) {
        return new faceapi.LabeledFaceDescriptors(
          u.label, [ new Float32Array(JSON.parse(u.descriptor)) ]
        );
      });
      faceMatcher = new faceapi.FaceMatcher(descs, THRESHOLD);
      isReady = true;
      setStatus(res.users.length + ' staff loaded — ready!', 'green');
      setBtn('btn-punch', false, '✅  Mark Attendance');
    } catch(err) {
      setStatus('DB error: ' + err.message, 'red');
    }
  }

  // ── MULTI-FRAME DETECTION ────────────────────
  // Captures N frames, averages descriptors — eliminates single-frame noise
  async function detectAvg(frames) {
    var opts = new faceapi.TinyFaceDetectorOptions({ inputSize: INPUT_SIZE, scoreThreshold: 0.45 });
    var descs = [];
    for (var i = 0; i < frames; i++) {
      try {
        var det = await faceapi.detectSingleFace(video, opts).withFaceLandmarks(true).withFaceDescriptor();
        if (det) descs.push(det.descriptor);
      } catch(e) {}
      if (i < frames - 1) await sleep(FRAME_GAP_MS);
    }
    // Need at least 60% success rate
    if (descs.length < Math.ceil(frames * 0.6)) return null;
    // Average all 128 dimensions
    var avg = new Float32Array(128);
    for (var j = 0; j < descs.length; j++)
      for (var k = 0; k < 128; k++) avg[k] += descs[j][k];
    for (var k = 0; k < 128; k++) avg[k] /= descs.length;
    return { descriptor: avg, count: descs.length };
  }

  function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

  // ── MARK ATTENDANCE ──────────────────────────
  document.getElementById('btn-punch').addEventListener('click', async function() {
    if (!isReady) { showAlert('alert-attend', '⏳ Still loading — please wait.', 'info'); return; }
    setBtn('btn-punch', true, '🔍 Scanning… hold still');
    showScanBar(true);

    var result = await detectAvg(DETECT_FRAMES);
    showScanBar(false);

    if (!result) {
      setBtn('btn-punch', false, '✅  Mark Attendance');
      showAlert('alert-attend', '❌ No face detected. Centre your face in the oval and hold still.', 'error');
      return;
    }

    var match = faceMatcher.findBestMatch(result.descriptor);
    if (match.label === 'unknown') {
      setBtn('btn-punch', false, '✅  Mark Attendance');
      showAlert('alert-attend', '❌ Face not recognised. Not registered, or try better lighting.', 'error');
      return;
    }

    showAlert('alert-attend', '⏳ Saving for ' + match.label + '…', 'info');
    var res = await api('recordAttendance', { name: match.label, gps: userLoc });
    setBtn('btn-punch', false, '✅  Mark Attendance');

    if (res.error) { showAlert('alert-attend', '⚠️ ' + res.error, 'warning'); return; }

    var conf = Math.round(Math.max(0, (1 - match.distance / THRESHOLD)) * 100);
    showSS(res.type, res.name, res.time, res.date, res.workingHours, conf, result.count);
  });

  // ── REGISTER ─────────────────────────────────
  document.getElementById('btn-save').addEventListener('click', async function() {
    var name = document.getElementById('reg-name').value.trim();
    if (!name) { showAlert('alert-reg', '⚠️ Enter staff name first.', 'error'); return; }
    if (!faceapi) { showAlert('alert-reg', '⏳ AI still loading, please wait.', 'info'); return; }

    setBtn('btn-save', true, '📸 Scanning ' + REG_FRAMES + ' frames…');
    showAlert('alert-reg', '⏳ Hold still — capturing face samples…', 'info');
    showScanBar(true);

    var result = await detectAvg(REG_FRAMES);
    showScanBar(false);

    if (!result) {
      setBtn('btn-save', false, '📸  Scan & Save Face');
      showAlert('alert-reg', '❌ Face not detected. Ensure good lighting and face the oval directly.', 'error');
      return;
    }

    showAlert('alert-reg', '⏳ Saving to Google Sheet…', 'info');
    var res = await api('registerUser', {
      name: name,
      descriptor: JSON.stringify(Array.from(result.descriptor))
    });
    setBtn('btn-save', false, '📸  Scan & Save Face');

    if (res.success) {
      document.getElementById('reg-name').value = '';
      goHome();
      await loadDatabase();
      showSS('register', name, '', '', '', null, result.count);
    } else {
      showAlert('alert-reg', '⚠️ ' + (res.message || 'Unknown error'), 'error');
    }
  });

  document.getElementById('btn-cancel').addEventListener('click', goHome);

  // ── REPORT ───────────────────────────────────
  document.getElementById('btn-close-rpt').addEventListener('click', function() {
    document.getElementById('report-section').style.display = 'none';
  });

  async function loadReport() {
    document.getElementById('report-section').style.display = 'block';
    document.getElementById('rpt-count').textContent = '…';
    document.getElementById('rpt-list').innerHTML = '<p style="font-size:0.8rem;color:#888;padding:8px 0;">Loading…</p>';
    try {
      var res = await api('getDailyReport', {});
      document.getElementById('rpt-count').textContent = res.count || 0;
      if (!res.staff || !res.staff.length) {
        document.getElementById('rpt-list').innerHTML = '<p style="font-size:0.8rem;color:#888;text-align:center;padding:8px;">No attendance today yet.</p>';
        return;
      }
      var html = '';
      res.staff.forEach(function(s, i) {
        var inB  = s.inTime  ? '<span class="badge-in">IN '  + s.inTime  + '</span>' : '<span style="color:#bbb;font-size:0.7rem">—</span>';
        var outB = s.outTime ? '<span class="badge-out">OUT ' + s.outTime + '</span>' : '<span style="color:#bbb;font-size:0.7rem">Still in</span>';
        var hrs  = s.workingHours ? '<span class="rhours">⏱ ' + s.workingHours + '</span>' : '';
        var map  = s.mapLink ? ' <a href="' + s.mapLink + '" target="_blank" style="text-decoration:none;">📍</a>' : '';
        html += '<div class="rrow"><div><div class="rname">' + (i+1) + '. ' + s.name + map + '</div><div class="rtimes">' + inB + ' &nbsp; ' + outB + '</div></div><div>' + hrs + '</div></div>';
      });
      document.getElementById('rpt-list').innerHTML = html;
      document.getElementById('report-section').scrollIntoView({ behavior:'smooth' });
    } catch(e) {
      document.getElementById('rpt-list').innerHTML = '<p style="color:red;font-size:0.8rem;">Error loading report.</p>';
    }
  }

  // ── NAVIGATION ───────────────────────────────
  function goHome() {
    showPanel('attend');
    document.getElementById('report-section').style.display = 'none';
  }
  function goAdd() {
    if (!faceapi) { alert('AI models still loading. Please wait a moment.'); return; }
    showPanel('register');
    setTimeout(function(){ document.getElementById('reg-name').focus(); }, 100);
  }
  function goReport() {
    showPanel('attend');
    loadReport();
  }

  // ── SUCCESS SCREEN ────────────────────────────
  function showSS(type, name, time, date, hours, conf, frames) {
    var isReg = type === 'register', isIN = type === 'IN', isOUT = type === 'OUT';
    document.getElementById('ss-icon').textContent  = isReg ? '🎉' : (isIN ? '🟢' : '🔴');
    document.getElementById('ss-badge').textContent = isReg ? 'REGISTERED' : (isIN ? 'PUNCHED IN' : 'PUNCHED OUT');
    document.getElementById('ss-badge').className   = 'ss-badge ' + (isReg ? 'reg' : (isIN ? 'in' : 'out'));
    document.getElementById('ss-name').textContent  = name;
    document.getElementById('ss-time').textContent  = isReg ? 'Face saved successfully' : ('🕐 ' + time + '   📅 ' + date);
    var hoursEl = document.getElementById('ss-hours');
    if (isOUT && hours) { hoursEl.textContent = '⏱ Working hours: ' + hours; hoursEl.style.display = 'block'; }
    else { hoursEl.style.display = 'none'; }
    var confEl = document.getElementById('ss-conf');
    if (conf !== null && conf !== undefined) {
      confEl.textContent = '🔍 Confidence: ' + conf + '%   |   ' + frames + ' frames averaged';
    } else {
      confEl.textContent = '📸 ' + frames + ' face samples averaged for accuracy';
    }
    document.getElementById('ss').classList.add('show');
  }
  function closeSS() { document.getElementById('ss').classList.remove('show'); }

  // ── HELPERS ──────────────────────────────────
  function showPanel(name) {
    document.getElementById('panel-attend').classList.toggle('hidden',   name !== 'attend');
    document.getElementById('panel-register').classList.toggle('hidden', name !== 'register');
  }
  function showScanBar(on) { document.getElementById('scan-bar').style.display = on ? 'block' : 'none'; }
  function setStatus(msg, color) {
    document.getElementById('stext').textContent = msg;
    document.getElementById('sdot').className = 'dot ' + color;
  }
  function setBtn(id, disabled, label) {
    var b = document.getElementById(id);
    b.disabled = disabled;
    b.textContent = label;
  }
  function showAlert(id, msg, type) {
    var el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'alert ' + type + ' show';
    if (type !== 'info') setTimeout(function(){ el.classList.remove('show'); }, 5000);
  }
  async function api(action, payload) {
    var res = await fetch(GAS_URL + '?action=' + action, {
      method: 'POST', mode: 'cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    return res.json();
  }
</script>
</body>
</html>
